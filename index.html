<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<div class="card">
  <h2>Ismingizni kiriting</h2>

  <input type="text" id="name" placeholder="Ismingiz">
  <button onclick="register()">Kirish</button>
</div> 

    <script>
    function register() {
    let ism = document.getElementById("name").value;

    localStorage.setItem("username", ism);

    window.location.href = "file:///C:/Users/ADMINPC/Desktop/Jasurbek/Maktab%20web%20site/index.html";
}
    </script>
    <style>
        body {
    margin: 0;
    font-family: Arial;
    background: #f5faff; /* oq-ko‘kimtir */
}

/* CARD (login oynasi) */
.card {
    width: 300px;
    margin: 120px auto;
    padding: 20px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,255,0.15);
    text-align: center;
}

.card h2 {
    color: #0033cc; /* ko‘k */
}

/* INPUT */
input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border: 2px solid #0033cc;
    border-radius: 8px;
    outline: none;
}

/* BUTTON */
button {
    width: 95%;
    padding: 10px;
    background: #ffd700; /* sariq */
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    color: #0033cc;
}

button:hover {
    background: #ffcc00;
}

/* HEADER */
.header {
    background: #0033cc; /* ko‘k */
    padding: 15px;
    color: white;
}

/* PROFILE */
.profile {
    display: flex;
    align-items: center;
    gap: 10px;
}

.profile img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid #ffd700; /* sariq chegara */
}
    </style>
</body>
</html>
